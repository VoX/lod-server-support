name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes from tag
        id: release_notes
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"

          # actions/checkout leaves a LIGHTWEIGHT tag on tag-triggered runs, which drops the
          # annotated tag's message (our release notes) and makes objecttype read 'commit'. Re-fetch
          # the real annotated object so the notes below are used instead of the commit-subject
          # fallback. Non-fatal (|| true): a fetch hiccup degrades to the fallback, never blocks publish.
          git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}" || true

          # Annotated tags have objecttype 'tag'; lightweight have 'commit'
          TAG_TYPE=$(git for-each-ref --format='%(objecttype)' "refs/tags/${TAG}")
          if [ "$TAG_TYPE" = "tag" ]; then
            NOTES=$(git for-each-ref --format='%(contents)' "refs/tags/${TAG}")
          else
            NOTES=""
          fi

          # Fallback for lightweight tags: commit subjects as bullet list
          if [ -z "$NOTES" ]; then
            PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -v "^${TAG}$" | head -1 || true)
            if [ -n "$PREV_TAG" ]; then
              NOTES=$(git log --format="- %s" "${PREV_TAG}..${TAG}")
            else
              NOTES=$(git log --format="- %s" "${TAG}")
            fi
          fi

          # Append compare link
          # `|| true`: under `set -euo pipefail`, grep -v exits 1 (aborting the step) when the
          # pushed tag is the only v* tag — i.e. the first-ever release. Tolerate the empty result.
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -v "^${TAG}$" | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            COMPARE="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${TAG}"
          else
            COMPARE="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commits/${TAG}"
          fi
          NOTES=$(printf '%s\n\n**Full Changelog**: %s' "$NOTES" "$COMPARE")

          {
            echo "notes<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - uses: gradle/actions/setup-gradle@v4

      - name: Build Fabric
        run: ./gradlew :fabric:build -x runClientGameTest -Pmod_version=${GITHUB_REF_NAME#v}

      # :paper:test gates the publish — :paper:shadowJar alone has no test dependency,
      # and this pipeline ships the Paper jar to three loaders irreversibly.
      - name: Build Paper + Tier 1 tests
        run: ./gradlew :paper:test :paper:shadowJar -Pmod_version=${GITHUB_REF_NAME#v}

      # Gate the tag-versioned artifacts that actually ship (build.yml gates only the default-version
      # CI build). GitHub Actions exports CI=true, so the build steps above produced CI-named jars
      # that release_check's RELEASE_GLOBS match. Runs after the builds, before the irreversible publish.
      - name: Release-jar safety gate
        run: python3 scripts/release_check.py --version "${GITHUB_REF_NAME#v}"

      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release_notes.outputs.notes }}
          # Without this, a glob matching nothing publishes an empty release silently;
          # failing here also stops the Modrinth steps from running against missing jars.
          fail_on_unmatched_files: true
          files: |
            fabric/build/libs/lod-server-support-fabric-*.jar
            paper/build/libs/lod-server-support-paper-*.jar

      - name: Upload Fabric to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: lKiXKLvv
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: fabric/build/libs/lod-server-support-fabric-*.jar
          name: ${{ github.ref_name }} - Fabric (MC 26.1)
          version: ${{ github.ref_name }}+fabric+mc26.1
          version-type: release
          loaders: fabric
          game-versions: |
            26.1
            26.1.1
            26.1.2
          changelog: ${{ steps.release_notes.outputs.notes }}

      - name: Upload Paper to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: lKiXKLvv
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: paper/build/libs/lod-server-support-paper-*.jar
          name: ${{ github.ref_name }} - Paper/Folia (MC 26.1.2)
          version: ${{ github.ref_name }}+paper+mc26.1.2
          version-type: release
          # One artifact serves all three Bukkit-family loaders (plugin.yml declares
          # folia-supported: true; release_check.py gates it). Folia support is experimental —
          # release notes must say so (CLAUDE.md, Release Notes Format rules).
          loaders: |
            paper
            purpur
            folia
          game-versions: |
            26.1.2
          changelog: ${{ steps.release_notes.outputs.notes }}
