name: Build

on:
  push:
    branches: [main, 'support/**']
  pull_request:
    branches: [main, 'support/**']

jobs:
  build:
    name: Build + Unit Tests + Server GameTests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5

      - name: Build Fabric + Tier 1 & 2 tests
        run: ./gradlew :fabric:build

      - name: Build Paper plugin (reobf release jar)
        run: ./gradlew :paper:build

      - name: Paper Tier 1 tests
        run: ./gradlew :paper:test

      - name: Soak checker + report selftests
        run: |
          python3 scripts/check_soak.py --selftest
          python3 scripts/soak_report.py --selftest
          python3 scripts/release_check.py --selftest

      - name: Release-jar safety gate
        run: python3 scripts/release_check.py

      - uses: actions/upload-artifact@v5
        with:
          name: lod-server-support-fabric
          path: fabric/build/libs/*.jar

      - uses: actions/upload-artifact@v5
        with:
          name: lod-server-support-paper
          # Only the reobf'd release jar — build/libs also holds the mojang-mapped dev
          # shadow jar (lss-paper-mojang-dev*) on this line, which must never ship.
          path: paper/build/libs/lod-server-support-paper*.jar

  # Tier 3 (client gametests) does not exist on the 1.20.1 line: fabric-api 0.92 has no
  # client gametest API. The soak harness is the E2E compensator (see the backport dossier).
